<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SGS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="aula.png" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="index.css">
    <title>SGS</title>
  </head>

  <body>
    <div class ="wrapper">
        <div class="from-header">
            <div class="titulo">
                <div class="titulo-login">Bienvenido a <span>SGS</span></div>
                <p class="sub-titulo">Accede a tu cuenta</p>
            </div>
        </div>
        <form action="#" class="login-form"autocomplete ="off">
            <div class="caja">
              <input type="text" class="input-field" id="log-email">
              <label for="log-email" class="label">Correo</label>
              <i class='bx bxl-gmail'></i>
            </div>
            <div class="caja">
              <input type="text" class="input-field" id="log-pass">
              <label for="log-pass" class="label">Contraseña</label>
              <i class='bx bx-key' ></i>
            </div>
            <div class="form-cols">
                <div class="col-1"></div>
                <div class="col-2">
                  <a href="#">¿Olvidó la contraseña?</a>
                </div>
            </div>
            <div class="caja">
              <button class="btn-submit" id="SignInBtn">Ingresar<i class='bx bx-log-in' ></i></button>
            </div>
            <div class="switch-form">
              <span>¿No tienes una cuenta? <a href="#">Registrate</a></span>
            </div>
        </form>
    </div>
  </body>
</html>
