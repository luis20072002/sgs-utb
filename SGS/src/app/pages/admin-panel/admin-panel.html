<!-- Loading -->
<div class="global-loading" *ngIf="isLoading">
  <div class="global-loading__icon"><span class="material-icons">verified_user</span></div>
  <div class="global-loading__spinner"></div>
</div>

<!-- App Layout -->
<div class="app-layout" *ngIf="!isLoading">
  <app-sidebar [activeTab]="activeTab" (tabChange)="onTabChange($event)"></app-sidebar>

  <div class="app-main">
    <app-header [user]="currentUser" (logout)="onLogout()"></app-header>

    <div class="app-content">

      <!-- Bienvenida -->
      <div class="welcome-section">
        <div>
          <p class="welcome-date">
            <span class="material-icons" style="font-size:14px">calendar_today</span>
            {{ currentDateTime }}
          </p>
          <h2 class="welcome-title">{{ welcomeTitle }}</h2>
        </div>
      </div>

      <!-- Dashboard -->
      <ng-container *ngIf="activeTab === 'dashboard' && !showCharts">
        <div class="section-hint">
          <span class="material-icons" style="font-size:14px;color:#3B82F6">info</span>
          Haz clic en una tarjeta para ver el gráfico detallado
        </div>
        <app-kpi-cards [stats]="stats" (cardClick)="onKpiClick()"></app-kpi-cards>
        <app-activity-feed [logs]="mockLogs"></app-activity-feed>
      </ng-container>

      <!-- Gráficos -->
      <ng-container *ngIf="showCharts">
        <div class="charts-header">
          <button class="btn-back" (click)="showCharts=false; activeTab='dashboard'">
            <span class="material-icons">arrow_back</span> Volver al Dashboard
          </button>
          <h3 class="charts-title">Estadísticas del sistema</h3>
        </div>
        <app-charts [stats]="stats"></app-charts>
      </ng-container>

      <!-- Usuarios -->
      <ng-container *ngIf="activeTab === 'users'">
        <app-users></app-users>
      </ng-container>

      <!-- Docentes -->
      <ng-container *ngIf="activeTab === 'teachers'">
        <app-teachers></app-teachers>
      </ng-container>

      <!-- Cursos -->
      <ng-container *ngIf="activeTab === 'courses'">
        <app-courses></app-courses>
      </ng-container>

      <!-- Horarios -->
      <ng-container *ngIf="activeTab === 'schedules'">
        <app-schedules></app-schedules>
      </ng-container>

      <!-- Registros -->
      <ng-container *ngIf="activeTab === 'logs'">
        <app-logs></app-logs>
      </ng-container>

      <!-- Reportes -->
      <ng-container *ngIf="activeTab === 'reports'">
        <app-reports></app-reports>
      </ng-container>

    </div>
  </div>
</div>
