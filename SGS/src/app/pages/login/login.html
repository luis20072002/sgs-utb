<div class="container-login">

    <div class="wrapper">
        <div class="from-header">
            <div class="titulo">
                <div class="titulo-login">Bienvenido a <span>SGS</span></div>
                <p class="sub-titulo">Accede a tu cuenta</p>
            </div>
        </div>

       <form [formGroup]="form" (ngSubmit)="login()" class="login-form" autocomplete="off">

    <div class="caja">
        <input type="text" class="input-field" id="log-email" formControlName="email">
        <label for="log-email" class="label">Correo</label>
        <i class='bx bxl-gmail'></i>
    </div>

    <div class="caja">
        <input type="password" class="input-field" id="log-pass" formControlName="password">
        <label for="log-pass" class="label">Contraseña</label>
        <i class='bx bx-key'></i>
    </div>

    <div class="form-cols">
        <div class="col-1"></div>
        <div class="col-2">
            <a href="#">¿Olvidó la contraseña?</a>
        </div>
    </div>

    <div class="caja">
        <button type="button" (click)="login()" class="btn-submit">
    TEST LOGIN
</button>
    </div>

    <div class="switch-form">
        <span>¿No tienes una cuenta? <a href="#">Registrate</a></span>
    </div>

</form>
    </div>

</div>
